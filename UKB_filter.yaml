stage1:
  enabled: true
  n_trials: 200

stage2:
  enabled: true
  min_dnm_count: 5
  max_dnm_count: 300

stage3:
  enabled: true
  n_trials: 2000
  sampler: tpe
  pruner: null  # Options: successive_halving, hyperband, median, null
  multivariate: false

optimisation:
  variant_types:
    - SNV
    - Insertion
    - Deletion
    
  # FIXED: Column names for input data (UKB) - must match exactly
  sample_id_column_data: SAMPLE
  paternal_age_column_data: paternal_age
  maternal_age_column_data: maternal_age
  reference_column_data: REF
  alternate_column_data: ALT

  # FIXED: Column names for reference data (deCODE parages)
  sample_id_column_reference: pid
  paternal_age_column_reference: paternal_age
  maternal_age_column_reference: maternal_age
  reference_column_reference: Ref
  alternate_column_reference: Alt

  # Column configurations - FIXED column names to match data
  columns:
    - name: DeNovoCNN_prob  # FIXED: was "DeNovoCNN probability"
      dtype: float
      optimisation: maximum  # Keep HIGH probability (confident calls)

    - name: DNM
      dtype: float
      optimisation: maximum

    - name: MQ
      dtype: int
      optimisation: maximum  # Keep HIGH mapping quality

    - name: nparAADn0
      dtype: int
      optimisation: minimum

    # FIXED: column names to match data (lowercase with underscores)
    - name: child_coverage  # FIXED: was "Child coverage"
      dtype: int
      optimisation: maximum

    - name: father_coverage  # FIXED: was "Father coverage"
      dtype: int
      optimisation: maximum
      linked_to: mother_coverage

    - name: mother_coverage  # FIXED: was "Mother coverage"
      dtype: int
      optimisation: maximum
      linked_to: father_coverage

    # abs_length is computed from REF/ALT in data.py, so use that column name
    - name: abs_length
      dtype: int
      optimisation: range
      range_constraint:
        min: 1
        max: 20
      variant_types:
        - Insertion
        - Deletion
      computed: true

    # Keep allele balance within a symmetric range
    - name: VAF
      dtype: float
      optimisation: range
      range_constraint:
        lower: 15
        scale: 100

    # IMF with regular (non-symmetric) range - only for indels
    - name: IMF
      dtype: float
      optimisation: range
      range_constraint:
        lower: 0.15
        scale: 1
      variant_types:
        - Insertion
        - Deletion

  regression_formula: "dnm_count ~ paternal_age"
  
  # Fixed weights - UNCOMMENTED and set to prioritize intercept
  regression_weights: [10.0, 1.0]  # [intercept_weight, slope_weight] - 10x weight on intercept
  regression_weights_by_type:
    Insertion: [10.0, 1.0]
    Deletion: [10.0, 1.0]
  
  # DISABLED - let fixed weights work
  optimise_intercept_weight: false
  intercept_weight_range: [0.001, 1.0]  # ignored when optimise_intercept_weight: false

# Performance settings
max_workers: 4
use_cache: true
cache_dir: null  # null means use default

# Reproducibility
seed: 49
deterministic: true
