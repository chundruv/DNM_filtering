stage1:
  enabled: true
  n_trials: 200

stage2:
  enabled: true
  min_dnm_count: 5
  max_dnm_count: 200

stage3:
  enabled: true
  n_trials: 2000
  sampler: tpe
  pruner: null  # Options: successive_halving, hyperband, median, null
  multivariate: true

optimisation:
  variant_types:
    - SNV
    - Insertion
    - Deletion
  # Required metadata column names in input data
  sample_id_column_data: Proband
  paternal_age_column_data: paternal_age
  maternal_age_column_data: maternal_age
  reference_column_data: Reference
  alternate_column_data: Variant

  # Required metadata column names in reference data
  sample_id_column_reference: pid
  paternal_age_column_reference: paternal_age
  maternal_age_column_reference: maternal_age
  reference_column_reference: Ref
  alternate_column_reference: Alt

  # Column configurations with types and optimisation criteria
  columns:
    - name: DeNovoCNN probability
      dtype: float
      optimisation: maximum  # Keep HIGH probability (confident calls)

    - name: DNM
      dtype: float
      optimisation: maximum

    - name: MQ
      dtype: int
      optimisation: maximum  # Keep HIGH mapping quality

    - name: nparAADn0
      dtype: int
      optimisation: minimum

    # Maximize coverage (higher is better)
    - name: Child coverage
      dtype: int
      optimisation: maximum
      range_constraint:
        min: 5
        max: 20

    - name: Father coverage
      dtype: int
      optimisation: maximum
      range_constraint:
        min: 5
        max: 20
      linked_to: Mother coverage

    - name: Mother coverage
      dtype: int
      optimisation: maximum
      range_constraint:
        min: 5
        max: 20
      linked_to: Father coverage

    - name: indel_length
      dtype: int
      optimisation: range
      range_constraint:
        min: 5
        max: 50
      variant_types:
        - Insertion
        - Deletion

    # Keep allele balance within a symmetric range
    - name: VAF
      dtype: float
      optimisation: range
      range_constraint:
        lower: 15
        scale: 100

    # IMF with regular (non-symmetric) range
    - name: IMF
      dtype: float
      optimisation: range
      range_constraint:
        lower: 0.15
        scale: 1
      variant_types:
        - Insertion
        - Deletion

  regression_formula: "dnm_count ~ paternal_age"
  regression_weights: [1.0, 5.0]
  loss_function: weighted_mse

# Performance settings
max_workers: 32
use_cache: true
cache_dir: null  # null means use default

# Reproducibility
seed: 49
deterministic: true
