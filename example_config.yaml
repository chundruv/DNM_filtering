# Example configuration file for DNM filtering pipeline

stage1:
  enabled: true
  n_trials: 50

stage2:
  enabled: true
  min_dnm_count: 5
  max_dnm_count: 300

stage3:
  enabled: true
  n_trials: 500
  sampler: tpe  # Options: tpe, cmaes, random
  pruner: successive_halving  # Options: successive_halving, hyperband, median, null
  multivariate: true

optimisation:
  variant_types:
    - SNV
    - Insertion
    - Deletion

  # Required metadata column names in input data
  sample_id_column_data: sample_id
  paternal_age_column_data: paternal_age
  maternal_age_column_data: maternal_age
  reference_column_data: ref
  alternate_column_data: alt

  # Required metadata column names in reference data
  sample_id_column_reference: sample_id
  paternal_age_column_reference: paternal_age
  maternal_age_column_reference: maternal_age
  reference_column_reference: ref
  alternate_column_reference: alt

  # Column configurations with types and optimisation criteria
  columns:
    # Regular optimization columns
    # Minimize quality score (lower is better)
    # Optional: Set explicit search space bounds with range_constraint
    - name: quality_score
      dtype: float
      optimisation: minimum
      range_constraint:
        min: 0.0
        max: 100.0

    # Maximize coverage (higher is better)
    # Optional: Set explicit search space bounds with range_constraint
    - name: coverage
      dtype: int
      optimisation: maximum
      range_constraint:
        min: 10
        max: 200

    # Keep allele balance within a symmetric range
    # Using symmetric_range_constraint where upper = 1 - lower
    - name: allele_balance
      dtype: float
      optimisation: range
      range_constraint:
        lower: 0.25
        scale: 1.0  # For 0-1 range (results in upper=0.75)

    # Example: minimum read position bias with explicit bounds
    - name: read_pos_bias
      dtype: float
      optimisation: minimum
      range_constraint:
        min: 0.0
        max: 10.0

    # Example: VAF percentage with symmetric range (for 0-100 scale)
    - name: vaf_percent
      dtype: float
      optimisation: range
      range_constraint:
        lower: 25
        scale: 100  # For percentage range (results in upper=75)

    # Example: keep mapping quality within a regular (non-symmetric) range
    - name: mapping_quality
      dtype: int
      optimisation: range
      range_constraint:
        min: 40
        max: 60

    # Variant-specific columns
    # SNV-only: base quality (only relevant for single nucleotide variants)
    - name: base_quality
      dtype: float
      optimisation: minimum
      variant_types:
        - SNV

    # Computed column: absolute indel length (calculated from REF/ALT)
    # Filter insertions and deletions by magnitude (absolute length)
    # optimisation: minimum means "keep small values, filter large values"
    # This suggests max_abs_length parameter - optimizer will find best cutoff
    # Applied to both insertions and deletions with the SAME threshold
    - name: abs_length
      dtype: int
      optimisation: minimum
      range_constraint:
        min: 1
        max: 50
      variant_types:
        - Insertion
        - Deletion
      computed: true  # This column is calculated from REF/ALT, not in raw input

    # Deletion-only: homopolymer length (longest run of repeated nucleotides)
    # Calculated from REF/ALT sequences - longer homopolymers indicate likely real variants
    # optimisation: maximum means "keep high values" - real deletions often in repetitive regions
    - name: homopolymer_length
      dtype: int
      optimisation: maximum
      range_constraint:
        min: 1
        max: 20
      variant_types:
        - Deletion
      computed: true  # Calculated from REF/ALT sequences

    # Linked columns (share the same threshold)
    # Useful for father/mother depth that should have the same minimum
    - name: depth_father
      dtype: int
      optimisation: maximum
      linked_to: depth_mother

    - name: depth_mother
      dtype: int
      optimisation: maximum
      linked_to: depth_father

  regression_formula: "dnm_count ~ paternal_age"
  # Weights for optimization: [intercept_weight, slope_weight, ...]
  # Higher weight = more important to match that coefficient
  # Typical: [0.1, 1.0] gives priority to slope while still considering intercept
  regression_weights: [0.1, 1.0]

  # Optional: Variant-type specific regression weights (overrides regression_weights for specified types)
  # regression_weights_by_type:
  #   Insertion: [0.05, 1.0]
  #   Deletion: [0.05, 1.0]

  # Loss function for optimization
  # Options:
  #   - weighted_mse: Weighted mean squared error (default, balanced approach)
  #   - absolute: Mean absolute error (robust to outliers)
  #   - huber: Huber loss (quadratic for small errors, linear for large errors)
  #   - log_ratio: Log-ratio loss (penalizes proportional errors)
  #   - slope_priority: Prioritizes slope matching with tolerance on intercept
  #   - asymmetric: Higher penalty for undershooting the slope target
  #   - max_slope: Maximum slope optimization with intercept tolerance
  loss_function: weighted_mse

  # Optional: Variant-type specific loss functions (overrides loss_function for specified types)
  # loss_function_by_type:
  #   SNV: max_slope
  #   Insertion: weighted_mse
  #   Deletion: weighted_mse

  # Huber loss delta parameter (only used when loss_function=huber)
  # Errors below delta use quadratic loss, above use linear loss
  huber_delta: 0.1

  # Asymmetric loss penalty multiplier (only used when loss_function=asymmetric)
  # Higher values increase penalty for undershooting the slope target
  asymmetric_penalty: 3.0

  # Intercept tolerance (only used with slope_priority or max_slope loss functions)
  # Allowed intercept deviation as a fraction before penalty kicks in
  intercept_tolerance: 0.5

# Performance settings
max_workers: 4
use_cache: true
cache_dir: null  # null means use default

# Reproducibility
seed: 42
deterministic: true
